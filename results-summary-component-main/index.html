<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Results summary component</title>
  <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

  <div class="container">
    <div class="score">
      <h1>Your Result</h1>
      <div class="circle">
        <div>
          <span class="main-score">76</span>
          of 100
        </div>
      </div>
      <h2>Great</h2>
      <p>You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    
    <div class="details">
      <h1>Summary</h1>
      <div class="card reaction">
        <img src="./assets/images/icon-reaction.svg" alt="reaction icon">
        Reaction
        <span class="specific-score"><span>80</span> / 100</span>
      </div>
      <div class="card memory">
        <img src="./assets/images/icon-memory.svg" alt="reaction icon">
        Memory
        <span class="specific-score"><span>92</span> / 100</span>
      </div>
      <div class="card verbal">
        <img src="./assets/images/icon-verbal.svg" alt="reaction icon">
        Verbal
        <span class="specific-score"><span>61</span> / 100</span>
      </div>
      <div class="card visual">
        <img src="./assets/images/icon-visual.svg" alt="reaction icon">
        Visual
        <span class="specific-score"><span>72</span> / 100</span>
      </div>
      <button>Continue</button>
    </div>
  </div>
</body>
</html>
